name: Java CI - Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile Java sources
        run: |
          mkdir -p out
          # Compile all .java files excluding workflow directory
          javac -d out $(find . -name '*.java' -not -path './.github/*')
          echo "Compiled files:"
          find out -type f -print

      - name: Run sample class if present
        run: |
          if [ -f out/Addition.class ]; then
            echo "Running Addition..."
            java -cp out Addition
          else
            echo "No Addition.class found; skipping run."
          fi
